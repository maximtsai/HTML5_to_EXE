name: Build SpellWheel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Built-in caching for node_modules

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          # This automatically handles the cargo home and target directories
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (Windows)
        run: npx tauri build

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: SpellWheel-Windows
          path: |
            src-tauri/target/release/SpellWheel.exe
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (macOS)
        run: npx tauri build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: SpellWheel-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg